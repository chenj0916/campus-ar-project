<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); color: white;
        display: flex; align-items: center; justify-content: center; z-index: 10;
        font-family: sans-serif;
      }
    </style>
  </head>
  
  <body>
    <div id="scanning-overlay">正在启动摄像头，请允许权限...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0.1" scale="0.3 0.3 0.3" material="color: red; opacity: 0.9"></a-box>
        <a-text value="AR Success!" color="white" align="center" width="2" position="0 0.4 0"></a-text>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener("arReady", (event) => {
        document.getElementById('scanning-overlay').innerHTML = "已就绪！请对准海报扫描";
        // 3秒后消失提示
        setTimeout(() => { document.getElementById('scanning-overlay').style.display = 'none'; }, 3000);
      });
      sceneEl.addEventListener("arError", (event) => {
        document.getElementById('scanning-overlay').innerHTML = "摄像头启动失败，请检查 HTTPS 或权限";
      });
    </script>
  </body>
</html>
