<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 强制全屏，防止白屏边缘 */
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0.1" scale="0.3 0.3 0.3" material="color: blue; opacity: 0.8"></a-box>
        <a-text value="Hello Campus!" color="red" align="center" width="2" position="0 0.4 0"></a-text>
      </a-entity>
    </a-scene>
  </body>
</html>
