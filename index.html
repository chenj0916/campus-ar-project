<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* 强制背景透明，确保 video 层可见 */
      body { margin: 0; overflow: hidden; background-color: transparent !important; }
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6); color: white;
        display: flex; align-items: center; justify-content: center; z-index: 999;
      }
      /* 隐藏 A-Frame 默认的加载 UI */
      .a-loader-title { display: none !important; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">正在拉取 AR 资源...</div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
      embedded
      renderer="colorManagement: true; precision: medium; antialias: false;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-sphere position="0 0 0.1" radius="0.2" color="#FF0000" material="opacity: 0.9"></a-sphere>
        <a-text value="AR SUCCESS" color="white" align="center" width="2" position="0 0.4 0"></a-text>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const overlay = document.getElementById('scanning-overlay');

      // 监听资源开始加载（此时 Network 应该出现 targets.mind）
      sceneEl.addEventListener("arReady", (event) => {
        console.log("MindAR 引擎就绪");
        overlay.innerHTML = "已就绪！请对准海报扫描";
        setTimeout(() => { overlay.style.display = 'none'; }, 3000);
      });

      // 监听错误
      sceneEl.addEventListener("arError", (event) => {
        overlay.style.background = "red";
        overlay.innerHTML = "系统异常，请检查摄像头权限或 HTTPS";
      });

      // 强制触发一次窗口大小调整，解决部分浏览器黑屏白屏问题
      window.addEventListener('load', () => {
        window.dispatchEvent(new Event('resize'));
      });
    </script>
  </body>
</html>
