<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* 关键：确保所有层级透明，露出底层的 video */
      body { margin: 0; overflow: hidden; background: none !important; }
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); color: white;
        display: flex; align-items: center; justify-content: center; z-index: 99;
      }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">正在唤醒摄像头...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" 
      embedded
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0.1" scale="0.4 0.4 0.4" material="color: #00FF00; opacity: 0.9"></a-box>
        <a-text value="Found You!" color="yellow" align="center" width="2" position="0 0.5 0"></a-text>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const overlay = document.getElementById('scanning-overlay');

      sceneEl.addEventListener("arReady", (event) => {
        overlay.innerHTML = "就绪！请对准海报扫描";
        setTimeout(() => { overlay.style.display = 'none'; }, 2000);
      });

      // 增加报错监听
      sceneEl.addEventListener("arError", (event) => {
        overlay.style.background = "red";
        overlay.innerHTML = "错误：未找到摄像头或 HTTPS 异常";
      });
    </script>
  </body>
</html>
