<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: none; }
      /* 强制显示加载状态，直到识别库加载完毕 */
      #status-indicator {
        position: fixed; top: 10px; left: 10px; padding: 8px;
        background: rgba(0,0,0,0.6); color: white; z-index: 10000; font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="status-indicator">正在初始化引擎...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind?v=999; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0.1" scale="0.4 0.4 0.4" material="color: #FF0000;"></a-box>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const indicator = document.getElementById('status-indicator');

      // 1. 检查 AR 是否准备好（识别库加载成功）
      sceneEl.addEventListener("arReady", (event) => {
        indicator.innerHTML = "识别库加载成功！请对准海报";
        indicator.style.background = "green";
        console.log("MindAR Ready");
      });

      // 2. 检查加载错误
      sceneEl.addEventListener("arError", (event) => {
        indicator.innerHTML = "识别库加载失败或权限拒绝";
        indicator.style.background = "red";
      });

      // 3. 检查是否扫到
      const targetEl = document.querySelector('[mindar-image-target]');
      targetEl.addEventListener("targetFound", () => {
        indicator.innerHTML = "已识别！模型应已出现";
        indicator.style.background = "blue";
      });
    </script>
  </body>
</html>
